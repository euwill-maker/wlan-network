<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WLAN Network — Em manutenção</title>
<meta name="description" content="Estamos preparando novidades. Fale com a gente pelo WhatsApp ou acesse sua conta.">
<link rel="icon" href="logo.png?v=3">
<style>
  :root{
    --blue:#1E6FC4;
    --blue-dark:#0A1E3D;
    --blue-mid:#1A5FB4;
    --blue-light:#29ABE2;
    --slate:#1e2433;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:radial-gradient(circle at 50% 0%, #12305c 0%, var(--blue-dark) 45%, #060f22 100%);
    color:#fff;
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 20px;
    text-align:center;
    position:relative;
    overflow-x:hidden;
  }
  .glow{
    position:absolute;
    width:520px;height:520px;
    background:radial-gradient(circle, rgba(41,171,226,.28) 0%, transparent 70%);
    top:-160px;left:50%;transform:translateX(-50%);
    pointer-events:none;
  }
  .card{
    position:relative;
    z-index:2;
    max-width:520px;
    width:100%;
  }
  .logo{
    width:150px;
    height:auto;
    margin:0 auto 34px;
    display:block;
    filter:drop-shadow(0 8px 24px rgba(0,0,0,.4));
  }
  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(41,171,226,.14);
    border:1px solid rgba(41,171,226,.4);
    color:var(--blue-light);
    font-size:13px;
    font-weight:600;
    letter-spacing:.5px;
    text-transform:uppercase;
    padding:8px 16px;
    border-radius:100px;
    margin-bottom:24px;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--blue-light);
    box-shadow:0 0 0 0 rgba(41,171,226,.6);
    animation:pulse 1.8s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(41,171,226,.6)}
    70%{box-shadow:0 0 0 12px rgba(41,171,226,0)}
    100%{box-shadow:0 0 0 0 rgba(41,171,226,0)}
  }
  h1{
    font-size:30px;
    line-height:1.2;
    font-weight:800;
    margin-bottom:16px;
  }
  h1 span{color:var(--blue-light)}
  p{
    font-size:17px;
    line-height:1.6;
    color:#c7d4e8;
    margin-bottom:36px;
  }
  .actions{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:16px 24px;
    border-radius:14px;
    font-size:16px;
    font-weight:700;
    text-decoration:none;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn:active{transform:scale(.98)}
  .btn-wpp{
    background:#25D366;
    color:#062b13;
    box-shadow:0 8px 24px rgba(37,211,102,.28);
  }
  .btn-conta{
    background:linear-gradient(135deg,var(--blue-light),var(--blue));
    color:#fff;
    box-shadow:0 8px 24px rgba(30,111,196,.35);
  }
  .btn svg{width:22px;height:22px;flex-shrink:0}
  .foot{
    margin-top:38px;
    font-size:13px;
    color:#7d8eae;
    line-height:1.6;
  }
  .foot a{color:var(--blue-light);text-decoration:none}
  @media(min-width:480px){
    h1{font-size:34px}
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <img src="logo.png?v=3" alt="WLAN Network" class="logo">

    <div class="badge"><span class="dot"></span> Em manutenção</div>

    <h1>Estamos deixando tudo <span>ainda melhor</span> pra você</h1>
    <p>Nosso site está passando por uma atualização. Enquanto isso, você pode falar com a gente ou acessar sua conta normalmente.</p>

    <div class="actions">
      <a class="btn btn-wpp" href="https://wa.me/556721044032?text=Ol%C3%A1!%20Preciso%20de%20atendimento%20da%20WLAN%20Network." target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.6 6.3A7.9 7.9 0 0 0 12 4a7.9 7.9 0 0 0-6.8 11.9L4 20l4.2-1.1A7.9 7.9 0 0 0 12 20a7.9 7.9 0 0 0 5.6-13.7Zm-5.6 12.2c-1.2 0-2.4-.3-3.4-.9l-.2-.1-2.5.7.7-2.4-.2-.3a6.6 6.6 0 1 1 5.6 3Zm3.6-4.9c-.2-.1-1.2-.6-1.3-.6-.2-.1-.3-.1-.5.1s-.5.6-.6.8-.2.1-.4 0a5.4 5.4 0 0 1-1.6-1 6 6 0 0 1-1.1-1.4c-.1-.2 0-.3.1-.4l.3-.4.2-.3v-.4l-.6-1.4c-.2-.4-.3-.3-.5-.4h-.4a.9.9 0 0 0-.6.3 2.5 2.5 0 0 0-.8 1.9A4.4 4.4 0 0 0 8.6 14a10 10 0 0 0 3.8 3.4c.5.2.9.4 1.3.5a3 3 0 0 0 1.4.1c.4-.1 1.2-.5 1.4-1s.2-.9.1-1l-.5-.3Z"/></svg>
        Falar no WhatsApp
      </a>
      <a class="btn btn-conta" href="https://ixc.wlannetwork.com.br/central_assinante_web/login" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h4"/></svg>
        Minha Conta / 2ª via de boleto
      </a>
    </div>

    <div class="foot">
      WLAN Network · Internet Fibra<br>
      Água Clara · Três Lagoas · Inocência
    </div>
  </div>
</body>
</html>
